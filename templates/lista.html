{% extends "base.html" %}

{% block menu %}
    {% include "menu.html" %}
{% endblock %}

{% block contenido %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1 class="fw-bold" style="font-size: 28px;">📁 Lista de Oficios</h1>
        <p class="text-muted" style="margin-top: -6px;">Panel ejecutivo de seguimiento</p>
    </div>

    <a href="{{ url_for('nuevo') }}" class="btn btn-success btn-lg">
        ➕ Nuevo oficio
    </a>
</div>

<!-- ============================
     FILTROS (como ayer)
============================= -->
<form method="GET" class="row g-3 mb-4">

    <div class="col-md-3">
        <label class="form-label">Buscar por asunto o folio</label>
        <input type="text" name="q" value="{{ request.args.get('q','') }}" class="form-control">
    </div>

    <div class="col-md-3">
        <label class="form-label">Gerencia</label>
        <select name="gerencia" class="form-select">
            <option value="">Todas</option>
            <option value="DG">DG</option>
            <option value="GAL">GAL</option>
            <option value="GPSOI">GPSOI</option>
            <option value="GSMA">GSMA</option>
            <option value="GSTS">GSTS</option>
        </select>
    </div>

    <div class="col-md-3">
        <label class="form-label">Estatus</label>
        <select name="estatus" class="form-select">
            <option value="">Todos</option>
            <option value="Pendiente">Pendiente</option>
            <option value="En proceso">En proceso</option>
            <option value="En Acuerdo">En Acuerdo</option>
            <option value="Solucionado">Solucionado</option>
        </select>
    </div>

    <div class="col-md-3 d-flex align-items-end">
        <button class="btn btn-primary w-100">Filtrar</button>
    </div>

</form>
