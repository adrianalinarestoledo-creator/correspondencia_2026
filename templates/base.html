<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Correspondencia 2026</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('lista') }}">📁 Correspondencia 2026</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">

                {% if session.get('rol') == 'admin' %}
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('nuevo') }}">➕ Nuevo Oficio</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('importar_excel') }}">📥 Importar Excel</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('usuarios') }}">👥 Usuarios</a>
                </li>
                {% endif %}

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('exportar_excel') }}">📤 Exportar Excel</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('exportar_pdf') }}">📄 Exportar PDF</a>
                </li>

            </ul>

            <span class="navbar-text text-white me-3">
                {{ session.get('gerencia') }}
            </span>

            <a class="btn btn-outline-light" href="{{ url_for('logout') }}">Salir</a>
        </div>
    </div>
</nav>

<div class="container">
    {% block contenido %}{% endblock %}
</div>

</body>
</html>
