<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Correspondencia</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background-color: #f0f2f5; /* Gris institucional */
    }

    header {
        background-color: #ffffff;
        color: #555555; /* Gris profesional */
        padding: 25px 0;
        margin-bottom: 20px;
        border: none;
    }

    /* ⭐ Estilo profesional para filtros en escala de grises */
    .filtro-gris {
        background-color: #f2f2f2;
        border: 1px solid #bfbfbf;
        color: #333;
        font-weight: 500;
    }

    .filtro-gris:focus {
        background-color: #e6e6e6;
        border-color: #8c8c8c;
        box-shadow: none;
        color: #000;
    }
</style>

</head>

<body>

<header class="text-center">
    <img src="{{ url_for('static', filename='img/logo.png') }}"
         alt="Logo SOAPAP"
         style="height:100px; margin-bottom:10px;">

    <h2 class="m-0 fw-bold" style="color:#555555;">
        Sistema de Correspondencia 2026 SOAPAP
    </h2>
</header>

<!-- Aquí se insertará el menú -->
{% block menu %}{% endblock %}

<div class="container mt-4">
    {% block contenido %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
