{% extends "base.html" %}

{% block contenido %}
<h3 class="mb-3">✏️ Editar usuario</h3>

<form action="{{ url_for('usuarios_actualizar', usuario_id=usuario[0]) }}" method="POST">

    <div class="mb-3">
        <label class="form-label">Usuario</label>
        <input type="text" class="form-control" value="{{ usuario[1] }}" disabled>
    </div>

    <div class="mb-3">
        <label class="form-label">Nombre completo</label>
        <input type="text" name="nombre_completo" class="form-control" value="{{ usuario[2] }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Rol</label>
        <select name="rol" class="form-select" required>
            <option value="usuario" {% if usuario[3] == 'usuario' %}selected{% endif %}>Usuario</option>
            <option value="admin" {% if usuario[3] == 'admin' %}selected{% endif %}>Admin</option>
            <option value="superadmin" {% if usuario[3] == 'superadmin' %}selected{% endif %}>Superadmin</option>
        </select>
    </div>

    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" name="activo" id="activoCheck"
               {% if usuario[4] %}checked{% endif %}>
        <label class="form-check-label" for="activoCheck">
            Usuario activo
        </label>
    </div>

    <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="{{ url_for('usuarios') }}" class="btn btn-secondary">Cancelar</a>
    </div>

</form>
{% endblock %}
