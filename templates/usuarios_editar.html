{% extends "base.html" %}

{% block contenido %}
<h3 class="mb-3">✏️ Editar usuario</h3>

<form action="{{ url_for('usuarios_actualizar', usuario_id=usuario.id) }}" method="POST">

    <div class="mb-3">
        <label class="form-label">Usuario</label>
        <input type="text" class="form-control" value="{{ usuario.usuario }}" disabled>
    </div>

    <div class="mb-3">
        <label class="form-label">Nombre completo</label>
        <input type="text" name="nombre_completo" class="form-control"
               value="{{ usuario.nombre_completo }}" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Rol</label>
        <select name="rol" id="rolSelect" class="form-select" required>
            <option value="usuario" {% if usuario.rol == 'usuario' %}selected{% endif %}>Usuario</option>
            <option value="admin" {% if usuario.rol == 'admin' %}selected{% endif %}>Administrador</option>
            <option value="superadmin" {% if usuario.rol == 'superadmin' %}selected{% endif %}>Superadministrador</option>
        </select>
    </div>

    <!-- ⭐ Campo de gerencia (solo para usuarios normales) -->
    <div class="mb-3" id="gerenciaDiv">
        <label class="form-label">Gerencia</label>
        <select name="gerencia" class="form-select">
            <option value="DG" {% if usuario.gerencia == 'DG' %}selected{% endif %}>DG</option>
            <option value="GAL" {% if usuario.gerencia == 'GAL' %}selected{% endif %}>GAL</option>
            <option value="GAL-Despacho" {% if usuario.gerencia == 'GAL-Despacho' %}selected{% endif %}>GAL-Despacho</option>
            <option value="GPSOI" {% if usuario.gerencia == 'GPSOI' %}selected{% endif %}>GPSOI</option>
            <option value="GSMA" {% if usuario.gerencia == 'GSMA' %}selected{% endif %}>GSMA</option>
            <option value="GSTS" {% if usuario.gerencia == 'GSTS' %}selected{% endif %}>GSTS</option>
        </select>
    </div>

    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" name="activo" id="activoCheck"
               {% if usuario.activo %}checked{% endif %}>
        <label class="form-check-label" for="activoCheck">
            Usuario activo
        </label>
    </div>

    <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="{{ url_for('usuarios') }}" class="btn btn-secondary">Cancelar</a>
    </div>

</form>

<script>
    const rolSelect = document.getElementById("rolSelect");
    const gerenciaDiv = document.getElementById("gerenciaDiv");

    function actualizarGerencia() {
        if (rolSelect.value === "usuario") {
            gerenciaDiv.style.display = "block";
        } else {
            gerenciaDiv.style.display = "none";
        }
    }

    rolSelect.addEventListener("change", actualizarGerencia);
    actualizarGerencia();
</script>

{% endblock %}
