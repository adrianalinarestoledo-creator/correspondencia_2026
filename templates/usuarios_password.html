{% extends "base.html" %}

{% block contenido %}
<h3 class="mb-3">🔐 Cambiar contraseña</h3>

<div class="card shadow-sm">
    <div class="card-body">

        <p class="mb-4">
            <strong>Usuario:</strong> {{ usuario.usuario }}<br>
            <strong>Nombre:</strong> {{ usuario.nombre_completo }}
        </p>

        <form action="{{ url_for('usuarios_password_actualizar', usuario_id=usuario.id) }}" method="POST">

            <div class="mb-3">
                <label class="form-label">Nueva contraseña</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-success">Guardar</button>
                <a href="{{ url_for('usuarios') }}" class="btn btn-secondary">Cancelar</a>
            </div>

        </form>

    </div>
</div>
{% endblock %}
