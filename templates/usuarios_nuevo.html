{% extends "base.html" %}

{% block contenido %}
<h3 class="mb-3">➕ Nuevo usuario</h3>

<form action="{{ url_for('usuarios_crear') }}" method="POST">

    <div class="mb-3">
        <label class="form-label">Usuario</label>
        <input type="text" name="usuario" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Nombre completo</label>
        <input type="text" name="nombre_completo" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" name="password" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Rol</label>
        <select name="rol" id="rolSelect" class="form-select" required>
            <option value="usuario">Usuario</option>
            <option value="admin">Administrador</option>
            <option value="superadmin">Superadministrador</option>
        </select>
    </div>

    <!-- ⭐ Campo de gerencia (solo para usuarios normales) -->
    <div class="mb-3" id="gerenciaDiv">
        <label class="form-label">Gerencia</label>
        <select name="gerencia" class="form-select">
            <option value="DG">DG</option>
            <option value="GAL">GAL</option>
            <option value="GAL-Despacho">GAL-Despacho</option>
            <option value="GPSOI">GPSOI</option>
            <option value="GSMA">GSMA</option>
            <option value="GSTS">GSTS</option>
        </select>
    </div>

    <div class="d-flex gap-2 mt-3">
        <button type="submit" class="btn btn-success">Guardar</button>
        <a href="{{ url_for('usuarios') }}" class="btn btn-secondary">Cancelar</a>
    </div>

</form>

<script>
    const rolSelect = document.getElementById("rolSelect");
    const gerenciaDiv = document.getElementById("gerenciaDiv");

    function actualizarGerencia() {
        if (rolSelect.value === "usuario") {
            gerenciaDiv.style.display = "block";
        } else {
            gerenciaDiv.style.display = "none";
        }
    }

    rolSelect.addEventListener("change", actualizarGerencia);
    actualizarGerencia();
</script>

{% endblock %}
