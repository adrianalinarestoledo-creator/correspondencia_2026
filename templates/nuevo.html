{% extends "base.html" %}

{% block menu %}
    {% include "menu.html" %}
{% endblock %}

{% block contenido %}

<h3 class="mb-4">➕ Nuevo Oficio</h3>

<form method="POST" class="row g-3">

    <!-- ⭐ FOLIO (solo mostrar, backend lo genera) -->
    <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">Folio</label>
        <input type="text" class="form-control filtro-gris" value="Se asignará automáticamente" readonly>
    </div>

    <!-- ⭐ Número de oficio externo -->
    <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">Número de oficio</label>
        <input type="text" name="numero_oficio" class="form-control filtro-gris" required>
    </div>

    <!-- ⭐ Fecha -->
    <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">Fecha</label>
        <input type="date" name="fecha" id="fecha" class="form-control filtro-gris" required>
    </div>

    <!-- ⭐ Hora -->
    <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">Hora</label>
        <input type="time" name="hora" class="form-control filtro-gris">
    </div>

    <!-- ⭐ Número de expediente -->
    <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">Número de expediente</label>
        <input type="text" name="numero_expediente" class="form-control filtro-gris">
    </div>

    <!-- ⭐ Quién emite -->
    <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">Quién emite</label>
        <input type="text" name="quien_emite" class="form-control filtro-gris">
    </div>

    <!-- ⭐ Con copia para -->
    <div class="col-md-12">
        <label class="form-label fw-bold text-secondary">Con copia para</label>
        <input type="text" name="con_copia_para" class="form-control filtro-gris">
    </div>

    <!-- ⭐ Anexos -->
    <div class="col-md-12">
        <label class="form-label fw-bold text-secondary">Anexos</label>
        <input type="text" name="anexos" class="form-control filtro-gris">
    </div>

    <!-- ⭐ Gerencia turnada -->
    <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">Gerencia turnada</label>
        <select name="gerencia_turnada" class="form-select filtro-gris" required>
            <option value="">Seleccione...</option>
            <option value="DG">DG</option>
            <option value="GAL">GAL</option>
            <option value="GAL-Despacho">GAL-Despacho</option>
            <option value="GPSOI">GPSOI</option>
            <option value="GSMA">GSMA</option>
            <option value="GSTS">GSTS</option>
        </select>
    </div>

    <!-- ⭐ Prioridad -->
    <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">Prioridad</label>
        <select name="prioridad" id="prioridad" class="form-select filtro-gris" required>
            <option value="No aplica">No aplica</option>
            <option value="Baja">Baja</option>
            <option value="Media">Media</option>
            <option value="Alta">Alta</option>
            <option value="Urgente">Urgente</option>
        </select>
    </div>

    <!-- ⭐ Término -->
    <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">Término (días)</label>
        <input type="number" name="termino" id="termino" class="form-control filtro-gris" readonly>
    </div>

    <!-- ⭐ Fecha límite -->
    <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">Fecha límite</label>
        <input type="date" name="fecha_limite" id="fecha_limite" class="form-control filtro-gris" readonly>
    </div>

    <!-- ⭐ Director -->
    <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">Director</label>
        <input type="text" name="responsable1" class="form-control filtro-gris">
    </div>

    <!-- ⭐ Gerente -->
    <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">Gerente</label>
        <input type="text" name="responsable2" class="form-control filtro-gris">
    </div>

    <!-- ⭐ NIS -->
    <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">NIS</label>
        <input type="text" name="nis" class="form-control filtro-gris">
    </div>

    <!-- ⭐ Asunto -->
    <div class="col-md-12">
        <label class="form-label fw-bold text-secondary">Asunto</label>
        <textarea name="asunto" class="form-control filtro-gris" rows="3" required></textarea>
    </div>

    <!-- ⭐ BOTONES -->
    <div class="col-md-12 d-flex justify-content-end gap-2 mt-3">
        <a href="{{ url_for('lista') }}" class="btn btn-secondary">Cancelar</a>
        <button class="btn btn-primary">Guardar</button>
    </div>

</form>

<!-- ⭐ SCRIPT: Cálculo de fecha límite -->
<script>
document.addEventListener("DOMContentLoaded", function () {

    const prioridad = document.getElementById("prioridad");
    const fechaIngreso = document.getElementById("fecha");
    const termino = document.getElementById("termino");
    const fechaLimite = document.getElementById("fecha_limite");

    function calcularFechaLimite() {
        if (!fechaIngreso.value) return;

        const fecha = new Date(fechaIngreso.value);
        let dias = 0;

        if (prioridad.value === "Urgente") dias = 1;
        else if (prioridad.value === "Alta") dias = 3;
        else if (prioridad.value === "Media") dias = 15;
        else if (prioridad.value === "Baja") dias = 30;
        else dias = 0; // No aplica

        termino.value = dias;

        if (dias === 0) {
            fechaLimite.value = "";
            return;
        }

        let contador = 0;
        let fechaTemp = new Date(fecha);

        while (contador < dias) {
            fechaTemp.setDate(fechaTemp.getDate() + 1);
            if (fechaTemp.getDay() !== 0 && fechaTemp.getDay() !== 6) {
                contador++;
            }
        }

        fechaLimite.value = fechaTemp.toISOString().split("T")[0];
    }

    prioridad.addEventListener("change", calcularFechaLimite);
    fechaIngreso.addEventListener("change", calcularFechaLimite);
});
</script>

{% endblock %}
