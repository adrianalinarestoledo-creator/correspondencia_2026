{% extends "base.html" %}
{% block contenido %}

<h3>➕ Registrar nuevo oficio</h3>

<form method="POST" class="mt-4">

    <div class="row">
        <div class="col-md-4 mb-3">
            <label>Número</label>
            <input type="text" name="numero" class="form-control" required>
        </div>

        <div class="col-md-4 mb-3">
            <label>Fecha ingreso</label>
            <input type="date" id="fecha" name="fecha" class="form-control" required>
        </div>

        <div class="col-md-4 mb-3">
            <label>Hora</label>
            <input type="time" name="hora" class="form-control">
        </div>
    </div>

    <div class="row">
        <div class="col-md-6 mb-3">
            <label>Número de expediente</label>
            <input type="text" name="numero_expediente" class="form-control">
        </div>

        <div class="col-md-6 mb-3">
            <label>Quién lo emite</label>
            <input type="text" name="quien_emite" class="form-control">
        </div>
    </div>

    <div class="mb-3">
        <label>Con copia para</label>
        <input type="text" name="con_copia_para" class="form-control">
    </div>

    <div class="mb-3">
        <label>Anexos</label>
        <input type="text" name="anexos" class="form-control">
    </div>

    <div class="mb-3">
        <label>Gerencia a turnar</label>
        <select name="gerencia_turnada" class="form-select" required>
            <option value="">Seleccione...</option>
            <option value="DG">DG</option>
            <option value="GAL">GAL</option>
            <option value="GAL-Despacho">GAL-Despacho</option>
            <option value="GPSOI">GPSOI</option>
            <option value="GSMA">GSMA</option>
            <option value="GSTS">GSTS</option>
        </select>
    </div>

    <div class="mb-3">
        <label>Asunto</label>
        <textarea name="asunto" class="form-control" required></textarea>
    </div>

    <div class="row">
        <div class="col-md-4 mb-3">
            <label>Prioridad</label>
            <select id="prioridad" name="prioridad" class="form-select" required>
                <option value="">Seleccione...</option>
                <option value="Urgente">Urgente</option>
                <option value="Alta">Alta</option>
                <option value="Media">Media</option>
                <option value="Baja">Baja</option>
                <option value="No aplica">No aplica</option>
            </select>
        </div>

        <div class="col-md-4 mb-3">
            <label>Término (días)</label>
            <input type="number" id="termino" name="termino" class="form-control" readonly>
        </div>

        <div class="col-md-4 mb-3">
            <label>Fecha límite de atención</label>
            <input type="date" id="fecha_limite" name="fecha_limite" class="form-control" readonly>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6 mb-3">
            <label>Director</label>
            <input type="text" name="responsable1" class="form-control">
        </div>

        <div class="col-md-6 mb-3">
            <label>Gerente</label>
            <input type="text" name="responsable2" class="form-control">
        </div>
    </div>

    <div class="mb-3">
        <label>NIS</label>
        <input type="text" name="nis" class="form-control">
    </div>

    <!-- ⭐ SOLO ESTE BLOQUE DE BOTONES DEBE EXISTIR -->
    <div class="mt-3 d-flex gap-2">
        <button class="btn btn-success">Guardar</button>
        <a href="{{ url_for('lista') }}" class="btn btn-secondary">Cancelar</a>
    </div>

</form>

<!-- ============================
     SCRIPT PARA CALCULAR FECHA LÍMITE
============================= -->
<script>
document.addEventListener("DOMContentLoaded", function () {

    const prioridad = document.getElementById("prioridad");
    const fechaIngreso = document.getElementById("fecha");
    const termino = document.getElementById("termino");
    const fechaLimite = document.getElementById("fecha_limite");

    function calcularFechaLimite() {
        if (!fechaIngreso.value) return;

        const fecha = new Date(fechaIngreso.value);
        let dias = 0;

        if (prioridad.value === "Urgente") dias = 1;
        else if (prioridad.value === "Alta") dias = 3;
        else if (prioridad.value === "Media") dias = 15;
        else if (prioridad.value === "Baja") dias = 30;
        else dias = 0;

        termino.value = dias;

        if (dias === 0) {
            fechaLimite.value = "";
            return;
        }

        let contador = 0;
        let fechaTemp = new Date(fecha);

        while (contador < dias) {
            fechaTemp.setDate(fechaTemp.getDate() + 1);
            if (fechaTemp.getDay() !== 0 && fechaTemp.getDay() !== 6) {
                contador++;
            }
        }

        fechaLimite.value = fechaTemp.toISOString().split("T")[0];
    }

    prioridad.addEventListener("change", calcularFechaLimite);
    fechaIngreso.addEventListener("change", calcularFechaLimite);
});
</script>

{% endblock %}
<script>
// ===============================
// VALIDACIÓN VISUAL PROFESIONAL
// ===============================
document.querySelector("form").addEventListener("submit", function (e) {

    let valido = true;
    let campos = document.querySelectorAll("input[required], select[required], textarea[required]");

    campos.forEach(campo => {
        if (!campo.value.trim()) {
            campo.classList.add("is-invalid");
            campo.classList.remove("is-valid");
            valido = false;
        } else {
            campo.classList.remove("is-invalid");
            campo.classList.add("is-valid");
        }
    });

    if (!valido) {
        e.preventDefault();
        alert("Por favor complete los campos obligatorios.");
        return;
    }

    // ===============================
    // CONFIRMACIÓN ANTES DE GUARDAR
    // ===============================
    let confirmar = confirm("¿Deseas guardar este oficio?");
    if (!confirmar) {
        e.preventDefault();
    }
});

// Quitar error visual al escribir
document.querySelectorAll("input, select, textarea").forEach(campo => {
    campo.addEventListener("input", function () {
        if (campo.value.trim()) {
            campo.classList.remove("is-invalid");
            campo.classList.add("is-valid");
        }
    });
});
</script>

<style>
/* Estilo profesional */
.is-invalid {
    border: 2px solid #dc3545 !important;
    background-color: #ffe6e6;
}

.is-valid {
    border: 2px solid #198754 !important;
    background-color: #e6ffed;
}
</style>
