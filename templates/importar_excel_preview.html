{% extends "base.html" %}

{% block menu %}
    {% include "menu.html" %}
{% endblock %}

{% block contenido %}

<h3>Vista previa del archivo</h3>

<table class="table table-bordered table-sm">
    <thead>
        <tr>
            {% for col in columnas %}
            <th>{{ col }}</th>
            {% endfor %}
        </tr>
    </thead>
    <tbody>
        {% for fila in preview %}
        <tr>
            {% for col in columnas %}
            <td>{{ fila[col] }}</td>
            {% endfor %}
        </tr>
        {% endfor %}
    </tbody>
</table>

<!-- ⭐ Botón que dispara la importación -->
<button id="btnGuardar" class="btn btn-success mt-3">Confirmar importación</button>

<!-- ⭐ Script que envía JSON a Flask -->
<script>
document.getElementById("btnGuardar").addEventListener("click", function () {

    fetch("{{ url_for('importar_excel_guardar') }}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({{ preview|tojson }})
    })
    .then(r => r.json())
    .then(data => {
        alert("Importación completada");
        window.location.href = "{{ url_for('lista') }}";
    })
    .catch(err => {
        alert("Error al importar");
        console.error(err);
    });

});
</script>

{% endblock %}
