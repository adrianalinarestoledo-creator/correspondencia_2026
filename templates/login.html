{% extends "base.html" %}
{% block contenido %}

<div class="text-center mb-4 mt-4">
    <h1 class="fw-bold" style="font-size: 32px; color:#555555;">
        Sistema de Correspondencia SOAPAP
    </h1>
    <p class="text-secondary" style="font-size: 16px;">
        Acceso seguro para usuarios autorizados
    </p>
</div>

<div class="card shadow-lg col-md-4 mx-auto" style="border-radius: 12px;">
    <div class="card-body">

        <h4 class="mb-3 text-center">Iniciar sesión</h4>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" name="usuario" class="form-control form-control-lg filtro-gris" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control form-control-lg filtro-gris" required>
            </div>

            <!-- ⭐ SELECTOR DE AÑO (2026–2036) -->
            <div class="mb-3">
                <label class="form-label fw-bold text-secondary">Año</label>
                <select name="anio" class="form-select filtro-gris">
                    {% for y in range(2026, 2037) %}
                        <option value="{{ y }}">{{ y }}</option>
                    {% endfor %}
                </select>
            </div>

            <button class="btn btn-primary w-100 btn-lg">Entrar</button>

        </form>

    </div>
</div>

{% endblock %}
