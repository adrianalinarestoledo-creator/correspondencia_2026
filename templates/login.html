{% extends "base.html" %}
{% block contenido %}

<style>
    body {
        background: linear-gradient(135deg, #003366, #0055a5);
        background-size: cover;
        background-repeat: no-repeat;
        min-height: 100vh;
    }
</style>

<div class="text-center text-white mb-4 mt-4">
    <h1 class="fw-bold" style="font-size: 32px;">Sistema de Correspondencia SOAPAP</h1>
    <p class="text-light" style="font-size: 16px;">Acceso seguro para usuarios autorizados</p>
</div>

<div class="card shadow-lg col-md-4 mx-auto" style="border-radius: 12px;">
    <div class="card-body">

        <h4 class="mb-3 text-center">Iniciar sesión</h4>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" name="usuario" class="form-control form-control-lg" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control form-control-lg" required>
            </div>

            <button class="btn btn-primary w-100 btn-lg">Entrar</button>

        </form>

    </div>
</div>

{% endblock %}
