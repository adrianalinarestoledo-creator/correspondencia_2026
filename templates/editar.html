{% extends "base.html" %}

{% block menu %}
    {% include "menu.html" %}
{% endblock %}

{% block contenido %}

<h3 class="mb-4">✏️ Editar Oficio</h3>

<form method="POST" class="row g-3">

    <!-- ⭐ FOLIO (solo lectura) -->
    <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">Folio</label>
        <input type="text" class="form-control filtro-gris" value="{{ oficio.numero }}" readonly>
    </div>

    <!-- ⭐ Estatus -->
    <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">Estatus</label>
        <select name="estatus" class="form-select filtro-gris">
            <option value="Pendiente"   {% if oficio.estatus == "Pendiente" %}selected{% endif %}>Pendiente</option>
            <option value="En proceso"  {% if oficio.estatus == "En proceso" %}selected{% endif %}>En proceso</option>
            <option value="En acuerdo"  {% if oficio.estatus == "En acuerdo" %}selected{% endif %}>En acuerdo</option>
            <option value="Solucionado" {% if oficio.estatus == "Solucionado" %}selected{% endif %}>Solucionado</option>
        </select>
    </div>

    <!-- ⭐ Gerencia turnada -->
    <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">Gerencia turnada</label>
        <select name="gerencia_turnada" class="form-select filtro-gris">
            <option value="DG" {% if oficio.gerencia_turnada == "DG" %}selected{% endif %}>DG</option>
            <option value="GAL" {% if oficio.gerencia_turnada == "GAL" %}selected{% endif %}>GAL</option>
            <option value="GAL-Despacho" {% if oficio.gerencia_turnada == "GAL-Despacho" %}selected{% endif %}>GAL-Despacho</option>
            <option value="GPSOI" {% if oficio.gerencia_turnada == "GPSOI" %}selected{% endif %}>GPSOI</option>
            <option value="GSMA" {% if oficio.gerencia_turnada == "GSMA" %}selected{% endif %}>GSMA</option>
            <option value="GSTS" {% if oficio.gerencia_turnada == "GSTS" %}selected{% endif %}>GSTS</option>
        </select>
    </div>

    <!-- ⭐ Director -->
    <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">Director</label>
        <input type="text" name="responsable1" class="form-control filtro-gris" value="{{ oficio.responsable1 }}">
    </div>

    <!-- ⭐ Gerente -->
    <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">Gerente</label>
        <input type="text" name="responsable2" class="form-control filtro-gris" value="{{ oficio.responsable2 }}">
    </div>

    <!-- ⭐ NIS -->
    <div class="col-md-4">
        <label class="form-label fw-bold text-secondary">NIS</label>
        <input type="text" name="nis" class="form-control filtro-gris" value="{{ oficio.nis }}">
    </div>

    <!-- ⭐ Asunto -->
    <div class="col-md-12">
        <label class="form-label fw-bold text-secondary">Asunto</label>
        <textarea name="asunto" class="form-control filtro-gris" rows="3">{{ oficio.asunto }}</textarea>
    </div>

    <!-- ⭐ BOTONES -->
    <div class="col-md-12 d-flex justify-content-end gap-2 mt-3">
        <a href="{{ url_for('lista') }}" class="btn btn-secondary">Cancelar</a>
        <button class="btn btn-primary">Guardar cambios</button>
    </div>

</form>

{% endblock %}
